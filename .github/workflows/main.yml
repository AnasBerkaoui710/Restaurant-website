name: Ultimate WebView App Builder – Android & iOS

on:
  workflow_dispatch:
    inputs:
      build_target:
        required: true
        default: "android"
        type: choice
        options: [android, ios, both]

      website_url:
        required: true
        default: "https://example.com"

      app_name:
        required: true
        default: "My Super App"

      app_id:
        required: true
        default: "com.example.app"

      version_name:
        required: true
        default: "1.0.0"

      version_code:
        required: true
        default: "1"

      app_color:
        required: true
        default: "#111827"

      status_bar_color:
        required: true
        default: "#000000"

      navigation_bar_color:
        required: true
        default: "#000000"

      splash_text:
        required: true
        default: "Loading..."

      orientation:
        required: true
        default: "portrait"
        type: choice
        options: [portrait, landscape, unspecified]

      fullscreen:
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]

      allow_http:
        required: true
        default: "false"
        type: choice
        options: ["true", "false"]

      allow_navigation:
        required: false
        default: "*"

      android_output:
        required: true
        default: "apk"
        type: choice
        options: [apk, aab, both]

permissions:
  contents: read
  actions: read

env:
  APP_NAME: ${{ github.event.inputs.app_name }}
  APP_ID: ${{ github.event.inputs.app_id }}
  WEBSITE_URL: ${{ github.event.inputs.website_url }}
  VERSION_NAME: ${{ github.event.inputs.version_name }}
  VERSION_CODE: ${{ github.event.inputs.version_code }}
  APP_COLOR: ${{ github.event.inputs.app_color }}
  STATUS_BAR_COLOR: ${{ github.event.inputs.status_bar_color }}
  NAV_BAR_COLOR: ${{ github.event.inputs.navigation_bar_color }}
  SPLASH_TEXT: ${{ github.event.inputs.splash_text }}
  FULLSCREEN: ${{ github.event.inputs.fullscreen }}
  ALLOW_HTTP: ${{ github.event.inputs.allow_http }}
  ALLOW_NAVIGATION: ${{ github.event.inputs.allow_navigation }}
  ORIENTATION: ${{ github.event.inputs.orientation }}

jobs:

  android:
    if: ${{ github.event.inputs.build_target != 'ios' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq imagemagick python3-pip
          pip install pillow

      - name: Create Capacitor project
        run: |
          mkdir app && cd app
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android

          mkdir -p www
          cat > www/index.html <<EOF
          <html>
          <head>
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>${APP_NAME}</title>
            <style>
              body{
                margin:0;
                background:${APP_COLOR};
                color:white;
                display:flex;
                justify-content:center;
                align-items:center;
                height:100vh;
                font-family:Arial;
              }
            </style>
          </head>
          <body>
            <h3>${SPLASH_TEXT}</h3>
          </body>
          </html>
          EOF

          npx cap init "${APP_NAME}" "${APP_ID}" --web-dir www
          npx cap add android

      # ===============================
      # ICON FROM LOCAL FILE (FIXED)
      # ===============================
      - name: Copy icon from repo
        run: |
          mkdir -p app/android/icon_src
          cp Images/GUSTO_favicon.png app/android/icon_src/icon.png

      - name: Generate Android icons
        run: |
          cd app/android

          python3 - <<'PY'
from PIL import Image
import os

src = "icon_src/icon.png"
img = Image.open(src).convert("RGBA")

sizes = {
    "mipmap-mdpi": 48,
    "mipmap-hdpi": 72,
    "mipmap-xhdpi": 96,
    "mipmap-xxhdpi": 144,
    "mipmap-xxxhdpi": 192
}

base = "app/src/main/res"

for folder, size in sizes.items():
    path = f"{base}/{folder}"
    os.makedirs(path, exist_ok=True)
    img.resize((size, size)).save(f"{path}/ic_launcher.png")
    img.resize((size, size)).save(f"{path}/ic_launcher_round.png")
PY

      # ===============================
      # UX IMPROVEMENTS (WEBVIEW)
      # ===============================
      - name: Configure MainActivity (ZOOM DISABLED)
        run: |
          cd app/android
          MAIN="app/src/main/java/$(echo ${APP_ID} | tr '.' '/')/MainActivity.java"

          cat > "$MAIN" <<EOF
package ${APP_ID};

import android.os.Bundle;
import android.webkit.WebSettings;
import android.webkit.WebView;
import com.getcapacitor.BridgeActivity;

public class MainActivity extends BridgeActivity {

    @Override
    public void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);

        WebView webView = this.bridge.getWebView();
        WebSettings s = webView.getSettings();

        // --- UX STABILITY SETTINGS ---
        s.setJavaScriptEnabled(true);
        s.setDomStorageEnabled(true);
        s.setMediaPlaybackRequiresUserGesture(false);

        // --- HARD DISABLE ZOOM (IMPORTANT) ---
        s.setSupportZoom(false);
        s.setBuiltInZoomControls(false);
        s.setDisplayZoomControls(false);

        // --- BETTER APP FEEL ---
        s.setLoadWithOverviewMode(true);
        s.setUseWideViewPort(true);
        s.setCacheMode(WebSettings.LOAD_CACHE_ELSE_NETWORK);
    }
}
EOF

      - name: Build APK
        run: |
          cd app/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: app/android/app/build/outputs/apk/debug/*.apk
